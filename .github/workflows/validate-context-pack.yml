name: Validate Context Pack

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate structure and references
        shell: pwsh
        run: ./scripts/validate-context-pack.ps1
